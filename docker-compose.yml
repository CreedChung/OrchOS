version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: orchos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-orchos}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./apps/server
    container_name: orchos-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/server/.env.local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/orchos}
      POSTGRES_DB: ${POSTGRES_DB:-orchos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/server:/app
    working_dir: /app
    command: bun run src/index.ts

volumes:
  postgres-data:
