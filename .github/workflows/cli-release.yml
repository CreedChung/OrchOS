name: Build & release CLI

on:
  push:
    branches: [main]
    tags: ["cli-v*", "v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0)"
        required: false
        type: string

jobs:
  check:
    name: Check if build is needed
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            changed="$(git diff --name-only HEAD~1 HEAD -- apps/cli/ 2>/dev/null || echo "")"
            if [ -n "$changed" ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    name: Build orchos-cli (${{ matrix.target }})
    needs: [check]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64-modern
            runner: ubuntu-latest
            artifact: orchos-cli-linux-x64
          - target: bun-linux-arm64-modern
            runner: ubuntu-24.04-arm
            artifact: orchos-cli-linux-arm64
          - target: bun-darwin-x64-modern
            runner: macos-13
            artifact: orchos-cli-darwin-x64
          - target: bun-darwin-arm64-modern
            runner: macos-latest
            artifact: orchos-cli-darwin-arm64
          - target: bun-windows-x64-modern
            runner: windows-latest
            artifact: orchos-cli-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/cli
        run: bun install --frozen-lockfile

      - name: Build binary
        working-directory: apps/cli
        run: |
          bun build --compile --target=${{ matrix.target }} ./src/index.ts --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: apps/cli/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: orchos-cli-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum orchos-cli-* > orchos-cli-checksums.txt

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            echo "name=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: OrchOS CLI ${{ steps.tag.outputs.name }}
          body: |
            ## OrchOS CLI ${{ steps.tag.outputs.name }}

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install-cli.sh | bash
            ```

            Or download a binary below for your platform.
          files: |
            orchos-cli-*
          generate_release_notes: false
          make_latest: true
          fail_on_unmatched_files: true
